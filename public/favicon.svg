<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Glow -->
  <ellipse cx="16" cy="16" rx="15" ry="15" fill="rgba(255,110,64,0.18)"/>
  <!-- Balloon body -->
  <ellipse cx="16" cy="14" rx="11" ry="13" fill="#ff6e40"/>
  <!-- Shine -->
  <ellipse cx="11.5" cy="9" rx="4" ry="5" fill="rgba(255,255,255,0.32)"/>
  <!-- Eyes (white) -->
  <ellipse cx="12" cy="12" rx="2.8" ry="3.2" fill="white"/>
  <ellipse cx="20" cy="12" rx="2.8" ry="3.2" fill="white"/>
  <!-- Pupils -->
  <ellipse cx="12.4" cy="12.6" rx="1.4" ry="1.6" fill="#1a1a2e"/>
  <ellipse cx="20.4" cy="12.6" rx="1.4" ry="1.6" fill="#1a1a2e"/>
  <!-- Angry eyebrows -->
  <line x1="9" y1="8.5" x2="15" y2="10.5" stroke="#bf360c" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="17" y1="10.5" x2="23" y2="8.5" stroke="#bf360c" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Smile (evil grin) -->
  <path d="M10 18 Q16 23 22 18" stroke="#bf360c" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Knot -->
  <ellipse cx="16" cy="28" rx="2.2" ry="2.2" fill="#e64a19"/>
  <!-- String -->
  <path d="M16 30 Q13 31 16 32" stroke="#aaa" stroke-width="1.3" fill="none"/>
</svg>
